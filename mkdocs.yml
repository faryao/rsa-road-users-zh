site_name: RSA 道路使用者指南
site_description: 爱尔兰道路安全局道路使用者指南中文参考译本
site_url: https://faryao.github.io/rsa-road-users-zh/
repo_url: https://github.com/faryao/rsa-road-users-zh
repo_name: faryao/rsa-road-users-zh
docs_dir: content/zh
site_dir: site

theme:
  name: material
  language: zh
  logo: assets/logo.svg
  favicon: assets/logo.svg
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.expand
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.action.view
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: light green
      toggle:
        icon: material/weather-night
        name: Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: lime
      toggle:
        icon: material/weather-sunny
        name: Light mode

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true

extra_css:
  - assets/extra.css

copyright: 非官方中文参考译本 · 请始终以 RSA 最新官方指南为准

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/faryao/rsa-road-users-zh
